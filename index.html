<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamX - Render Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/webtorrent@latest/webtorrent.min.js"></script>
    <style>
        :root { --bg: #0a0a0c; --panel: #141419; --accent: #00f2fe; --text: #ffffff; --text-dim: #7e7e8c; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        header { text-align: center; max-width: 600px; margin: 20px auto; }
        header h1 { font-size: 2.8em; color: var(--accent); margin-bottom: 20px; }
        .search-box { display: flex; background: var(--panel); border: 1px solid #22222a; border-radius: 30px; padding: 6px 10px; }
        .search-box input { flex: 1; background: transparent; border: none; padding: 10px 15px; color: white; font-size: 1.1em; outline: none; }
        .search-box button { background: var(--accent); color: #000; border: none; padding: 12px 28px; border-radius: 25px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .spinner { display: none; width: 40px; height: 40px; border: 4px solid #1f1f26; border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 40px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status-msg { text-align: center; color: var(--text-dim); margin: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; max-width: 1200px; margin: 40px auto; }
        .card { background: var(--panel); border-radius: 12px; overflow: hidden; border: 1px solid #1f1f26; display: flex; flex-direction: column; }
        .card img { width: 100%; height: 260px; object-fit: cover; }
        .card-body { padding: 15px; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .card-title { font-size: 1em; font-weight: 600; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .stream-btn { background: #1f1f26; color: #fff; border: 1px solid #2d2d3a; padding: 10px; border-radius: 8px; width: 100%; font-weight: 600; cursor: pointer; }
        .stream-btn:hover { background: var(--accent); color: #000; }
        #cinema-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 5, 7, 0.98); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .close-cinema { position: absolute; top: 25px; right: 35px; font-size: 45px; color: var(--text-dim); background: none; border: none; cursor: pointer; }
        #video-wrapper { width: 100%; max-width: 900px; background: #000; border-radius: 12px; overflow: hidden; }
        video { width: 100%; display: block; }
        .player-dashboard { max-width: 900px; width: 100%; margin-top: 15px; background: var(--panel); padding: 15px; border-radius: 12px; }
        .progress-track { width: 100%; height: 6px; background: #222; border-radius: 3px; overflow: hidden; margin-bottom: 10px; }
        .progress-fill { height: 100%; width: 0%; background: var(--accent); transition: 0.3s; }
        .live-stats { display: flex; justify-content: space-between; font-family: monospace; font-size: 0.9em; color: var(--text-dim); }
    </style>
</head>
<body>

    <header>
        <h1>StreamX</h1>
        <div class="search-box">
            <input type="text" id="queryInput" placeholder="Enter movie title..." onkeypress="if(event.key === 'Enter') executeSearch()">
            <button onclick="executeSearch()">Search</button>
        </div>
    </header>

    <div class="spinner" id="loadingSpinner"></div>
    <div id="status-msg"></div>
    <div class="grid" id="outputGrid"></div>

    <div id="cinema-overlay">
        <button class="close-cinema" onclick="terminateStream()">×</button>
        <div id="video-wrapper"></div>
        <div class="player-dashboard">
            <div class="progress-track"><div class="progress-fill" id="streamProgress"></div></div>
            <div class="live-stats">
                <span id="streamStatus">Connecting to peers...</span>
                <span>Speed: <strong id="streamSpeed">0.00 MB/s</strong></span>
                <span>Network: <strong id="streamPeers">0 Peers</strong></span>
            </div>
        </div>
    </div>

    <script>
        const p2pClient = new WebTorrent();
        let activeTorrent = null;

        async function executeSearch() {
            const searchVal = document.getElementById('queryInput').value.trim();
            if (!searchVal) return;

            const grid = document.getElementById('outputGrid');
            const spinner = document.getElementById('loadingSpinner');
            const status = document.getElementById('status-msg');

            grid.innerHTML = '';
            status.innerText = '';
            spinner.style.display = 'block';

            try {
                // IMPORTANT: We now ask YOUR secure backend to do the search!
                const response = await fetch(`/api/search?q=${encodeURIComponent(searchVal)}`);
                const payload = await response.json();
                
                spinner.style.display = 'none';

                if (payload.error || !payload.data || !payload.data.movies) {
                    status.innerText = payload.error || "No results found.";
                    return;
                }

                payload.data.movies.forEach(item => {
                    const preferredTorrent = item.torrents.find(t => t.quality === '720p' || t.quality === '1080p') || item.torrents[0];
                    const trackingHubs = '&tr=wss%3A%2F%2Ftracker.btorrent.xyz&tr=wss%3A%2F%2Ftracker.openwebtorrent.com';
                    const magnetURI = `magnet:?xt=urn:btih:${preferredTorrent.hash}&dn=${encodeURIComponent(item.title)}${trackingHubs}`;

                    const element = document.createElement('div');
                    element.className = 'card';
                    element.innerHTML = `
                        <img src="${item.medium_cover_image}" alt="Poster" onerror="this.src='https://via.placeholder.com/200x260?text=No+Cover'">
                        <div class="card-body">
                            <div class="card-title">${item.title} (${item.year})</div>
                            <button class="stream-btn" onclick="initializeStream('${magnetURI}', '${item.title.replace(/'/g, "\\'")}')">▶ Stream</button>
                        </div>
                    `;
                    grid.appendChild(element);
                });
            } catch (err) {
                spinner.style.display = 'none';
                status.innerText = "Server Error. Check Render logs.";
            }
        }

        function initializeStream(magnet, movieTitle) {
            const overlay = document.getElementById('cinema-overlay');
            const container = document.getElementById('video-wrapper');
            const txtStatus = document.getElementById('streamStatus');
            const txtSpeed = document.getElementById('streamSpeed');
            const txtPeers = document.getElementById('streamPeers');
            const progress = document.getElementById('streamProgress');

            overlay.style.display = 'flex';
            container.innerHTML = ''; 
            txtStatus.innerText = `Connecting WebRTC swarm...`;
            txtSpeed.innerText = '0.00 MB/s';
            txtPeers.innerText = '0 Peers';
            progress.style.width = '0%';

            if (activeTorrent) p2pClient.remove(activeTorrent.infoHash);

            p2pClient.add(magnet, function (torrent) {
                activeTorrent = torrent;
                
                const mediaFile = torrent.files.find(f => f.name.endsWith('.mp4') || f.name.endsWith('.webm') || f.name.endsWith('.mkv'));

                if (!mediaFile) {
                    txtStatus.innerText = 'Error: No web-supported video format.';
                    return;
                }

                txtStatus.innerText = 'Buffering video...';
                mediaFile.appendTo('#video-wrapper', { autoplay: true, muted: false });

                torrent.on('download', function () {
                    txtPeers.innerText = `${torrent.numPeers} Peers`;
                    txtSpeed.innerText = `${(torrent.downloadSpeed / 1048576).toFixed(2)} MB/s`;
                    progress.style.width = `${(torrent.progress * 100).toFixed(1)}%`;
                });
            });
        }

        function terminateStream() {
            document.getElementById('cinema-overlay').style.display = 'none';
            document.getElementById('video-wrapper').innerHTML = ''; 
            if (activeTorrent) { p2pClient.remove(activeTorrent.infoHash); activeTorrent = null; }
        }
    </script>
</body>
</html>
